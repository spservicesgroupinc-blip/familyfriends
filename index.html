
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VerityNow.AI</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme & Colors -->
    <meta name="theme-color" content="#1e3a8a">
    <meta name="msapplication-TileColor" content="#1e3a8a">
    
    <!-- Apple-specific PWA meta tags -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VerityNow">
    
    <!-- Android splash screen -->
    <link rel="apple-touch-startup-image" href="/icon-192x192.svg">
    
    <!-- SEO & Social -->
    <meta name="description" content="A neutral co-parenting incident tracker powered by AI to help divorced or separated parents log and analyze incidents.">
    <meta name="keywords" content="co-parenting, incident tracker, custody, AI, family law">
    <meta name="author" content="VerityNow.AI">
    <meta property="og:title" content="VerityNow.AI - Co-Parenting Incident Tracker">
    <meta property="og:description" content="AI-powered incident logging and analysis for co-parents">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://veritynow.ai">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VerityNow.AI">
    <meta name="twitter:description" content="AI-powered co-parenting incident tracker">
    
    <!-- Self-hosted fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Print styles -->
    <style>
      @media print {
        body * { visibility: hidden; }
        .printable-area, .printable-area * { visibility: visible; }
        .printable-area { position: absolute; left: 0; top: 0; width: 100%; height: auto; padding: 0; margin: 0; border: none; box-shadow: none; }
        .no-print { display: none !important; }
        @page { size: letter; margin: 1in; @bottom-right { content: "Page " counter(page); font-family: "Times New Roman", Times, serif; font-size: 10pt; color: #333; } }
        html, body { font-family: "Times New Roman", Times, serif; color: #000; background-color: #fff !important; counter-reset: page; }
        .pdf-container { margin: 0; padding: 0; line-height: 1.5; font-size: 12pt; -webkit-font-smoothing: antialiased; }
        .pdf-header { text-align: center; margin-bottom: 24pt; border-bottom: 2px solid #000; padding-bottom: 12pt; }
        .pdf-h1 { font-size: 16pt !important; margin-bottom: 6pt; font-weight: bold; text-transform: uppercase; }
        .pdf-h2 { font-size: 13pt !important; margin-top: 20pt; margin-bottom: 10pt; font-weight: bold; text-decoration: underline; text-transform: uppercase; }
        .pdf-meta { font-size: 10pt !important; color: #333; margin-top: 8pt; }
        .pdf-preamble { margin-bottom: 18pt; text-align: justify; }
        .pdf-section { margin-bottom: 18pt; page-break-inside: avoid; }
        .pdf-body-paragraph { margin: 8pt 0; text-align: justify; text-indent: 0.5in; widows: 2; orphans: 2; }
        .pdf-ul { margin: 8pt 0 8pt 0.5in; padding-left: 0; list-style-type: disc; }
        .pdf-li { margin: 4pt 0; text-align: justify; widows: 2; orphans: 2; }
        .pdf-signature { margin-top: 36pt; page-break-inside: avoid; }
        .pdf-sig-line { border-top: 1px solid #000; width: 300px; margin-top: 48pt; display: inline-block; }
        .pdf-sig-label { margin-top: 4pt; font-size: 10pt !important; }
        .pdf-notes { font-size: 9pt !important; color: #666; margin-top: 18pt; font-style: italic; }
      }
    </style>
    
    <!-- Vite entry point -->
    <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-100 font-sans text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
