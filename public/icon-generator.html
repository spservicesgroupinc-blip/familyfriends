<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h2>PWA Icon Generator</h2>
<p>Click each button to download the icon:</p>
<button onclick="downloadIcon(192)">Download icon-192x192.png</button>
<button onclick="downloadIcon(512)">Download icon-512x512.png</button>
<button onclick="downloadIcon(180)">Download apple-touch-icon.png (180x180)</button>
<button onclick="downloadIcon(1024)">Download icon-1024x1024.png</button>
<script>
function downloadIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Background
  ctx.fillStyle = '#1e3a8a';
  ctx.fillRect(0, 0, size, size);
  
  // Book icon paths (scaled)
  const scale = size / 24;
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1.5 * scale;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  
  // Left page
  ctx.beginPath();
  ctx.moveTo(12 * scale, 6.042 * scale);
  ctx.quadraticCurveTo(8.5 * scale, 4.5 * scale, 6 * scale, 3.75 * scale);
  ctx.quadraticCurveTo(4.5 * scale, 3.75 * scale, 3 * scale, 4.262 * scale);
  ctx.lineTo(3 * scale, 18 * scale);
  ctx.quadraticCurveTo(4.5 * scale, 17.25 * scale, 6 * scale, 18 * scale);
  ctx.quadraticCurveTo(8.5 * scale, 18.867 * scale, 12 * scale, 20.292 * scale);
  ctx.stroke();
  
  // Right page
  ctx.beginPath();
  ctx.moveTo(12 * scale, 6.042 * scale);
  ctx.quadraticCurveTo(15.5 * scale, 4.5 * scale, 18 * scale, 3.75 * scale);
  ctx.quadraticCurveTo(19.5 * scale, 3.75 * scale, 21 * scale, 4.262 * scale);
  ctx.lineTo(21 * scale, 18 * scale);
  ctx.quadraticCurveTo(19.5 * scale, 17.25 * scale, 18 * scale, 18 * scale);
  ctx.quadraticCurveTo(15.5 * scale, 18.867 * scale, 12 * scale, 20.292 * scale);
  ctx.stroke();
  
  // Center line
  ctx.beginPath();
  ctx.moveTo(12 * scale, 6.042 * scale);
  ctx.lineTo(12 * scale, 20.292 * scale);
  ctx.stroke();
  
  // Download
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = size === 180 ? 'apple-touch-icon.png' : `icon-${size}x${size}.png`;
    a.click();
    URL.revokeObjectURL(url);
  });
}
</script>
</body>
</html>
